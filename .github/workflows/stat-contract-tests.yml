name: Stat contract tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  stat-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run stat audit tests
        run: |
          # Run headless audit/contract tests only to avoid GUI deps
          pytest -q tests/test_data_stat_key_audit.py tests/test_turnstats_write_audit.py

      - name: Run tools/stat_key_audit.py
        run: |
          python tools/stat_key_audit.py
