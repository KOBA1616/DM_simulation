name: CI
# 再発防止: ジョブ①(headless) は PyQt6 なしで動作することを保証する。
#           ジョブ②(gui) は PyQt6 ありで GUI テストを実行する。
#           旧 headless-smoke・full-tests・mypy-nightly は廃止し、2ジョブ構成に統一済み。

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
      - "feature/headless-v3-command-architecture"
  pull_request:
  schedule:
    - cron: '0 3 * * *'

jobs:
  # ジョブ①: PyQt6 なしでのヘッドレステスト
  headless:
    name: Headless (no PyQt6)
    runs-on: windows-latest
    env:
      # 再発防止: headless CI では Qt 初期化順序の揺らぎで不安定化しうるため、
      # editor 側をダミー Qt 実装へ固定して順序依存エラーを防ぐ。
      DM_TOOLKIT_FORCE_DUMMY_QT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-headless-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-headless-

      - name: Install core deps (no PyQt6)
        run: pip install -e .

      - name: Verify ONNX Runtime version alignment
        run: python -m pytest tests/test_onnxruntime_version_alignment.py -q

      - name: Build C++ extension
        shell: pwsh
        run: .\scripts\build.ps1

      - name: Verify no legacy Action layer
        shell: pwsh
        run: |
          # 再発防止: コメント行 (^\s*#) は除外して実コードのみをチェックする
          $hits = Get-ChildItem -Path . -Recurse -Include "*.py" |
                  Select-String -Pattern "^(?!\s*#).*\b(action_to_command|compat_wrappers|unified_execution)\b" |
                  Where-Object { $_.Path -notmatch "HEADLESS_MIGRATION_PLAN|\.md$" }
          if ($hits) {
            Write-Error "Legacy Action layer detected:`n$($hits | Out-String)"
            exit 1
          }
          Write-Host "OK: Legacy Action layer not found."

      - name: Verify dm_env has no PyQt6 imports
        shell: pwsh
        run: |
          $hits = Get-ChildItem -Path "python\dm_env" -Recurse -Include "*.py" |
                  Select-String -Pattern "PyQt6|PySide6"
          if ($hits) {
            Write-Error "GUI import found in dm_env!`n$($hits | Out-String)"
            exit 1
          }
          Write-Host "OK: dm_env is PyQt6-free."

      - name: Run headless tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUTF8: "1"
        run: |
          mkdir -p reports
          python -m pytest tests/test_command_flow.py tests/test_headless_runner.py -v --junitxml=reports/junit-headless.xml

      - name: Smoke - headless ai-vs-ai
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUTF8: "1"
        run: python tools/run_headless.py --mode ai-vs-ai

      - name: Upload headless test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-headless
          path: reports/junit-headless.xml

  # ジョブ②: PyQt6 ありでの GUI テスト
  gui:
    name: GUI (with PyQt6)
    runs-on: windows-latest
    needs: headless
    env:
      # 再発防止: GUI ジョブは実 Qt の回帰検知が目的なので、ダミー Qt 強制を無効化する。
      DM_TOOLKIT_FORCE_DUMMY_QT: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-gui-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-gui-

      - name: Install with [gui] extras
        run: pip install -e ".[gui]"

      - name: Build C++ extension
        shell: pwsh
        run: .\scripts\build.ps1

      - name: Run all tests (GUI tests included)
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUTF8: "1"
        run: |
          mkdir -p reports
          python -m pytest tests/ -v --junitxml=reports/junit-gui.xml

      - name: Run mypy (non-failing, staged)
        continue-on-error: true
        run: python -m mypy --config-file mypy.ini dm_toolkit/ 2>&1 | Tee-Object reports/mypy-gui.txt

      - name: Upload GUI test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-gui
          path: reports/junit-gui.xml

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-gui-report
          path: reports/mypy-gui.txt

  # ナイトリー: mypy フル検証（スケジュール or main のみ）
  mypy-nightly:
    name: Nightly mypy (full, artifact)
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run mypy (full) and save output
        continue-on-error: true
        run: |
          mkdir -p reports
          python -m mypy --config-file mypy.ini dm_toolkit/ 2>&1 | Tee-Object reports/mypy-full.txt

      - name: Upload mypy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-full-report
          path: reports/mypy-full.txt
