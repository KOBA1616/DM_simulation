name: Stat-Scaled Contract Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  stat-scaled-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run STAT_SCALED contract tests
        run: |
          pytest -q tests/test_payment_stat_scaled_integration.py tests/test_cost_modifier_stat_scaled_clamp.py tests/test_cost_modifier_stat_scaled.py
